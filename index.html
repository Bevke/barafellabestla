        body {

            padding: 20px;

        }

            background-color: rgba(15, 23, 42, 0.6);

            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: rgba(51, 65, 85, 0.4);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .pos {
            font-weight: bold;
            width: 40px;
            text-align: center;
        }

        tr:nth-child(1) .pos { color: #fbbf24; } /* 1. Altın */

        }

        .loading {

            padding: 40px;
            font-size: 1.2rem;
            color: #94a3b8;
        }
    </style>
</head>
