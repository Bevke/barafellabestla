<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor League | Beta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060b19;
            --bg-card: rgba(15, 23, 42, 0.65);
            --border-glow: rgba(56, 189, 248, 0.2);
            --border-glow-hover: rgba(56, 189, 248, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #38bdf8;
            --neon-purple: #a855f7;
            --neon-gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; padding-bottom: 60px; }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(8, 47, 73, 0.5), transparent);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        header p { color: var(--text-muted); font-size: 1.1rem; margin-top: 10px; font-weight: 300; }

        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; padding: 0 20px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-glow);
            color: var(--text-muted);
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .tab-btn:hover, .tab-btn.active {
            color: var(--text-main);
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease forwards; }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border 0.3s;
            margin-bottom: 25px;
        }
        .card:hover { border-color: var(--border-glow-hover); }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); font-size: 0.85rem; letter-spacing: 1px; padding: 15px; border-bottom: 2px solid rgba(255,255,255,0.05); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.95rem; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .team-card:hover { border-color: var(--neon-gold); transform: translateY(-5px); }
        .team-logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid rgba(255,255,255,0.1); }
        
        .recent-match-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .match-date { font-size: 0.8rem; color: var(--text-muted); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>Editor League | Beta</h1>
        <p>Canlı İstatistik ve Kulüp Veritabanı Merkezi</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('puan-durumu')">PUAN DURUMU</button>
        <button class="tab-btn" onclick="switchTab('kralliklar')">KRALLIKLAR</button>
        <button class="tab-btn" onclick="switchTab('takimlar')">TAKIMLAR</button>
        <button class="tab-btn" onclick="switchTab('son-maclar')">SON MAÇLAR</button>
    </div>

    <div class="container">
        <div id="puan-durumu" class="tab-content active">
            <div class="card">
                <table>
                    <thead>
                        <tr><th>#</th><th>TAKIM</th><th>O</th><th>G</th><th>B</th><th>M</th><th>AV</th><th>PUAN</th></tr>
                    </thead>
                    <tbody id="puanTbody"></tbody>
                </table>
            </div>
        </div>

        <div id="kralliklar" class="tab-content">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="card">
                    <h3 style="color: var(--neon-gold); margin-bottom: 15px; font-family:'Orbitron';">⚽ GOL KRALLIĞI</h3>
                    <table><thead><tr><th>OYUNCU</th><th>TAKIM</th><th>GOL</th></tr></thead><tbody id="golTbody"></tbody></table>
                </div>
                <div class="card">
                    <h3 style="color: var(--neon-blue); margin-bottom: 15px; font-family:'Orbitron';">🎯 ASİST KRALLIĞI</h3>
                    <table><thead><tr><th>OYUNCU</th><th>TAKIM</th><th>ASİST</th></tr></thead><tbody id="asistTbody"></tbody></table>
                </div>
                <div class="card">
                    <h3 style="color: var(--neon-purple); margin-bottom: 15px; font-family:'Orbitron';">🛡️ KURTARIŞ KRALLIĞI</h3>
                    <table><thead><tr><th>OYUNCU</th><th>TAKIM</th><th>SAVE</th></tr></thead><tbody id="kurtarisTbody"></tbody></table>
                </div>
            </div>
        </div>

        <div id="takimlar" class="tab-content">
            <div class="grid-layout" id="takimlarGrid"></div>
            <div id="takimDetayCard" class="card" style="margin-top: 30px; display: none;">
                <h2 id="detayTakimAdi" style="font-family:'Orbitron'; color: var(--neon-blue); margin-bottom: 10px;"></h2>
                <p id="detayTakimAciklama" style="color: var(--text-muted); margin-bottom: 20px; font-style: italic;"></p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <h4 style="color: var(--neon-gold); margin-bottom: 10px;">🏃 Aktif Oyuncular</h4>
                        <ul id="detayOyuncuList" style="list-style: none; padding-left: 5px;"></ul>
                    </div>
                    <div>
                        <h4 style="color: var(--neon-blue); margin-bottom: 10px;">📋 Son Maçları</h4>
                        <div id="detayMacList"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="son-maclar" class="tab-content">
            <div class="card" id="maclarListesi"></div>
        </div>
    </div>

    <script>
        let globalData = {};
        const apiURL = "http://127.0.0.1:5000/api/puan-durumu"; // Render API URL'ini buraya koy moruk

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async def verileriYukle() {
            try {
                const res = await fetch(apiURL);
                globalData = await res.json();
                
                // 1. PUAN DURUMU RENDER
                const pTbody = document.getElementById('puanTbody');
                pTbody.innerHTML = "";
                let takimlarSorted = Object.entries(globalData.takimlar || {}).sort((a,b) => b[1].Puan - a[1].Puan);
                takimlarSorted.forEach(([name, s], idx) => {
                    pTbody.innerHTML += `<tr><td>${idx+1}</td><td><b>${name}</b></td><td>${s.O}</td><td>${s.G}</td><td>${s.B}</td><td>${s.M}</td><td>${s.AG-s.YG}</td><td style="color:var(--neon-blue); font-weight:bold;">${s.Puan}</td></tr>`;
                });

                // 2. KRALLIKLAR RENDER (GOL, ASİST, KURTARIŞ)
                const oyuncular = Object.values(globalData.oyuncular || {});
                
                const golSorted = [...oyuncular].sort((a,b) => b.G - a.G).slice(0, 5);
                document.getElementById('golTbody').innerHTML = golSorted.map(o => `<tr><td>${o.futbolcu_ismi}</td><td>${o.takim}</td><td style="color:var(--neon-gold)"><b>${o.G}</b></td></tr>`).join('');
                
                const asistSorted = [...oyuncular].sort((a,b) => b.A - a.A).slice(0, 5);
                document.getElementById('asistTbody').innerHTML = asistSorted.map(o => `<tr><td>${o.futbolcu_ismi}</td><td>${o.takim}</td><td style="color:var(--neon-blue)"><b>${o.A}</b></td></tr>`).join('');

                const kurtarisSorted = [...oyuncular].sort((a,b) => (b.K || 0) - (a.K || 0)).slice(0, 5);
                document.getElementById('kurtarisTbody').innerHTML = kurtarisSorted.map(o => `<tr><td>${o.futbolcu_ismi}</td><td>${o.takim}</td><td style="color:var(--neon-purple)"><b>${o.K || 0}</b></td></tr>`).join('');

                // 3. TAKIMLAR SEKMESİ RENDER
                const tGrid = document.getElementById('takimlarGrid');
                tGrid.innerHTML = "";
                const sabitTakimlar = ["Madeus FC", "OOG FC", "Tgf Juniors", "Bursaspor FC", "MetoSpor", "Anaokulu FC"];
                sabitTakimlar.forEach(tName => {
                    const meta = (globalData.takim_ayarlari && globalData.takim_ayarlari[tName]) || {logo: "https://via.placeholder.com/150", aciklama: "Resmi Lig Kulübü"};
                    const logoSrc = meta.logo || "https://via.placeholder.com/150";
                    tGrid.innerHTML += `
                        <div class="team-card" onclick="takimDetayAc('${tName}')">
                            <img class="team-logo" src="${logoSrc}">
                            <h3 style="font-family:'Orbitron';">${tName}</h3>
                        </div>
                    `;
                });

                // 4. SON MAÇLAR RENDER (Kayıt Tarihli, ID'siz)
                const mList = document.getElementById('maclarListesi');
                mList.innerHTML = "";
                const maclar = globalData.maclar || [];
                if(maclar.length === 0) mList.innerHTML = "<p style='color:var(--text-muted); text-align:center;'>Henüz maç oynanmadı moruk.</p>";
                [...maclar].reverse().forEach(m => {
                    mList.innerHTML += `
                        <div class="recent-match-row">
                            <div><span style="color:var(--neon-blue); font-weight:bold;">${m.ev}</span> vs <span style="color:var(--neon-gold); font-weight:bold;">${m.dep}</span></div>
                            <div style="font-family:'Orbitron'; font-weight:900; font-size:1.1rem; background:rgba(255,255,255,0.05); padding:5px 15px; border-radius:5px;">${m.skor}</div>
                            <div class="match-date">📅 ${m.tarih || 'Az Önce'}</div>
                        </div>
                    `;
                });

            } catch(e) { console.log("Veri yükleme hatası moruk:", e); }
        }

        function takimDetayAc(tName) {
            const meta = (globalData.takim_ayarlari && globalData.takim_ayarlari[tName]) || {aciklama: "Resmi Lig Kulübü"};
            document.getElementById('detayTakimAdi').innerText = tName;
            document.getElementById('detayTakimAciklama').innerText = meta.aciklama || "Açıklama girilmemiş moruk.";
            
            // Oyuncuları Filtrele
            const kadro = Object.values(globalData.oyuncular || {}).filter(o => o.takim === tName);
            const oList = document.getElementById('detayOyuncuList');
            oList.innerHTML = kadro.length ? kadro.map(o => `<li style="padding:4px 0; color:var(--text-main)">⚡ ${o.futbolcu_ismi} <span style='color:var(--text-muted); font-size:0.8rem;'>(${o.mevki})</span></li>`).join('') : "<li>Kadro boş moruk.</li>";
            
            // Takımın Maçlarını Filtrele
            const tMaclar = (globalData.maclar || []).filter(m => m.ev === tName || m.dep === tName);
            const mList = document.getElementById('detayMacList');
            mList.innerHTML = tMaclar.length ? tMaclar.map(m => `<div style='font-size:0.85rem; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.02);'>🏟️ ${m.ev} ${m.skor} ${m.dep}</div>`).join('') : "<div style='color:var(--text-muted);'>Maç kaydı yok.</div>";
            
            document.getElementById('takimDetayCard').style.display = "block";
            document.getElementById('takimDetayCard').scrollIntoView({ behavior: 'smooth' });
        }

        verileriYukle();
        setInterval(verileriYukle, 30000); // 30 saniyede bir otomatik tıkla
    </script>
</body>
</html>
