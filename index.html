<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 Canlı Yayın Oynatıcı</title>
    <!-- Video.js veya Hls.js için modern bir oynatıcı tasarımı (Plyr) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #38bdf8;
        }
        .video-wrapper {
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Canlı Yayın Oynatıcı</h1>
    
    <div class="video-wrapper">
        <!-- Oynatıcı Elementi -->
        <video id="player" controls crossorigin playsinline></video>
    </div>
</div>

<!-- HLS.js ve Plyr Kütüphaneleri -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // BURAYA KENDİ M3U8 LINKINIZI YAZIN
        const source = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'; 
        
        const video = document.getElementById('player');
        
        // Tarayıcının yerel HLS desteği yoksa (Chrome, Firefox vb.) Hls.js kullan
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(source);
            hls.attachMedia(video);
            window.hls = hls;
        } 
        // Tarayıcının yerel HLS desteği varsa (Safari veya iOS cihazlar) doğrudan oynat
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source;
        }
        
        // Oynatıcı arayüzünü güzelleştirmek için Plyr'ı başlat
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            tooltips: { controls: true, seek: true }
        });
    });
</script>

</body>
</html>
