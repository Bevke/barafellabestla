<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Lig | Canlı Puan Durumu</title>
    <style>
        :root { --bg-color: #0f172a; --card-color: #1e293b; --text-color: #f8fafc; --accent-color: #38bdf8; --border-color: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--accent-color); margin-bottom: 20px; font-size: 2.5rem; text-transform: uppercase; }
        .container { width: 100%; max-width: 1000px; background-color: var(--card-color); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        th { background-color: rgba(15, 23, 42, 0.6); color: var(--accent-color); }
        .pos { font-weight: bold; width: 40px; text-align: center; }
        .team-name { font-weight: 600; color: #fff; }
        .puan-col { font-weight: 700; color: var(--accent-color); }
        .center-col { text-align: center; }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>🏆 SANAL LİG PUAN DURUMU 🏆</h1>

    <div class="container">
        <table id="puan-tablosu">
            <thead>
                <tr>
                    <th class="center-col" style="width: 50px;">Sıra</th>
                    <th>Takım Adı</th>
                    <th class="center-col">O</th>
                    <th class="center-col">G</th>
                    <th class="center-col">B</th>
                    <th class="center-col">M</th>
                    <th class="center-col">AG</th>
                    <th class="center-col">YG</th>
                    <th class="center-col">AV</th>
                    <th class="center-col">Puan</th>
                </tr>
            </thead>
            <tbody id="tablo-govde">
                <tr>
                    <td colspan="10" class="loading">Puan durumu güvenli sunucudan çekiliyor...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function puanDurumuGetir() {
            try {
                // Site direkt senin bilgisayarındaki bota soruyor. Arada aracı yok, şifre yok!
                const response = await fetch('https://yepfella.onrender.com/api/puan-durumu');
                const ligVerisi = await response.json();

                const takimListesi = [];
                for (const takimAdi in ligVerisi) {
                    const ist = ligVerisi[takimAdi];
                    takimListesi.push({
                        isim: takimAdi, o: ist.O, g: ist.G, b: ist.B, m: ist.M,
                        ag: ist.AG, yg: ist.YG, av: (ist.AG - ist.YG), puan: ist.Puan
                    });
                }

                takimListesi.sort((a, b) => b.puan !== a.puan ? b.puan - a.puan : b.av - a.av);

                const tbody = document.getElementById("tablo-govde");
                tbody.innerHTML = ""; 

                takimListesi.forEach((takim, index) => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="pos center-col">${index + 1}</td>
                            <td class="team-name">${takim.isim}</td>
                            <td class="center-col">${takim.o}</td>
                            <td class="center-col">${takim.g}</td>
                            <td class="center-col">${takim.b}</td>
                            <td class="center-col">${takim.m}</td>
                            <td class="center-col">${takim.ag}</td>
                            <td class="center-col">${takim.yg}</td>
                            <td class="center-col">${takim.av > 0 ? '+' + takim.av : takim.av}</td>
                            <td class="center-col puan-col">${takim.puan}</td>
                        </tr>`;
                });
            } catch (error) {
                document.getElementById("tablo-govde").innerHTML = `<tr><td colspan="10" class="loading" style="color: #ef4444;">❌ Lig sunucusuna bağlanılamadı! (Botun açık olduğundan emin olun)</td></tr>`;
            }
        }
        puanDurumuGetir();
    </script>
</body>
</html>
