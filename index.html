<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zeph.</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f1f17, #050807);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* arka plan animasyon */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent, #00ff8844, transparent);
  animation: moveBg 8s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

.container {
  position: relative;
  width: 100%;
  max-width: 420px;
  padding: 25px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(20, 30, 25, 0.6);
  border: 1px solid rgba(0,255,136,0.2);
  box-shadow: 0 0 40px #00ff8822;
  text-align: center;
  z-index: 1;
}

/* profil */
.profile {
  margin-bottom: 25px;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ff88;
  box-shadow: 0 0 20px #00ff88;
  margin-bottom: 10px;
}

.profile h1 {
  font-size: 28px;
}

.profile p {
  font-size: 14px;
  color: #aaa;
}

/* link kartları */
.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.4);
  border: 1px solid #1f2f28;
  padding: 15px 20px;
  border-radius: 15px;
  margin-bottom: 15px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

/* hover glow */
.link:hover {
  transform: translateY(-3px) scale(1.02);
  border-color: #00ff88;
  box-shadow: 0 0 20px #00ff8855;
}

/* hover shine efekti */
.link::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, #00ff8833, transparent);
  left: -100%;
  transition: 0.5s;
}

.link:hover::before {
  left: 100%;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ikon */
.icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #00ff88;
  color: black;
  font-weight: bold;
}

/* sağ ok */
.arrow {
  opacity: 0.5;
  font-size: 18px;
}

/* giriş animasyonu */
.link {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s forwards;
}

.link:nth-child(2){animation-delay:.1s;}
.link:nth-child(3){animation-delay:.2s;}
.link:nth-child(4){animation-delay:.3s;}
.link:nth-child(5){animation-delay:.4s;}
.link:nth-child(6){animation-delay:.5s;}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">
    <img src="https://i.pravatar.cc/150?img=3">
    <h1>zeph.</h1>
    <p>Tüm platformlarda beni takip edin</p>
  </div>

  <a href="https://instagram.com/" class="link">
    <div class="left">
      <div class="icon">IG</div>
      <span>Instagram</span>
    </div>
    <span class="arrow">›</span>
  </a>

  <a href="#" class="link">
    <div class="left">
      <div class="icon">K</div>
      <span>Kick</span>
    </div>
    <span class="arrow">›</span>
  </a>

  <a href="#" class="link">
    <div class="left">
      <div class="icon">EP</div>
      <span>Edit Pack</span>
    </div>
    <span class="arrow">›</span>
  </a>

  <a href="#" class="link">
    <div class="left">
      <div class="icon">TT</div>
      <span>TikTok</span>
    </div>
    <span class="arrow">›</span>
  </a>

  <a href="#" class="link">
    <div class="left">
      <div class="icon">YT</div>
      <span>YouTube</span>
    </div>
    <span class="arrow">›</span>
  </a>

</div>

</body>
</html>
