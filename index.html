<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Lig | Pro Esports Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #060b19; --card-color: #0f172a; --text-color: #f8fafc; --accent-blue: #00f2fe; --accent-orange: #ff8c00; --accent-green: #10b981; --accent-red: #ef4444; --border-color: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        h1 { color: #fff; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 20px rgba(0,242,254,0.6); margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 1200px; flex-wrap: wrap; justify-content: center;}
        .tab-btn { background-color: var(--card-color); border: 1px solid var(--border-color); color: var(--text-color); padding: 12px 18px; cursor: pointer; font-weight: 700; border-radius: 8px; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .tab-btn.active, .tab-btn:hover { background: linear-gradient(90deg, #00f2fe, #4facfe); color: #000; box-shadow: 0 0 15px rgba(0,242,254,0.5); border-color: transparent; }
        
        .container { width: 100%; max-width: 1100px; background-color: var(--card-color); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7); display: none; }
        .container.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; border-bottom: 1px solid var(--border-color); text-align: left; }
        th { background-color: #090d16; color: var(--accent-blue); font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background-color: rgba(30, 41, 59, 0.5); }
        .center-col { text-align: center; }
        .puan-col { font-weight: bold; color: var(--accent-blue); }
        .money-col { font-weight: bold; color: var(--accent-green); }
        
        /* VS ARENA */
        .vs-arena { display: flex; flex-direction: column; align-items: center; padding: 30px; background: radial-gradient(circle, #121b2e 0%, #060b19 100%); }
        .vs-selectors { display: flex; gap: 30px; margin-bottom: 30px; width: 100%; justify-content: center; }
        .vs-select { background: #1e293b; color: #fff; border: 2px solid var(--border-color); padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 1rem; width: 250px; outline: none; }
        
        .vs-display { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 900px; gap: 20px; }
        .player-card { display: flex; flex-direction: column; align-items: center; width: 200px; }
        .player-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--border-color); object-fit: cover; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .player-card.p1 .player-avatar { border-color: var(--accent-blue); }
        .player-card.p2 .player-avatar { border-color: var(--accent-orange); }
        .player-name { font-size: 1.5rem; font-weight: 800; margin-top: 15px; text-transform: uppercase; text-align: center; }
        .player-value { font-size: 1rem; color: var(--accent-green); font-weight: bold; margin-top: 5px; }
        
        .chart-box { width: 350px; height: 350px; position: relative; }
        .vs-bars-container { width: 100%; max-width: 800px; margin-top: 40px; display: flex; flex-direction: column; gap: 15px; }
        .bar-row { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .bar-label { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: #94a3b8; }
        .bar-wrapper { display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 15px; }
        .bar-val { font-weight: 800; font-size: 1.1rem; width: 40px; }
        .bar-val.p1 { color: var(--accent-blue); text-align: right; }
        .bar-val.p2 { color: var(--accent-orange); text-align: left; }
        .bar-bg { flex: 1; height: 12px; background: #1e293b; border-radius: 6px; overflow: hidden; display: flex; }
        .fill-p1 { height: 100%; background: var(--accent-blue); transition: width 0.5s ease; }
        .fill-p2 { height: 100%; background: var(--accent-orange); transition: width 0.5s ease; margin-left: auto; }
        
        .motm-badge { background: linear-gradient(45deg, #fbbf24, #f59e0b); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 5px;}
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>⚡ SANAL LİG ARENA HUB ⚡</h1>
    
    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('puan-tab')">Puan Durumu</div>
        <div class="tab-btn" onclick="switchTab('vs-tab')">VS Arena</div>
        <div class="tab-btn" onclick="switchTab('borsa-tab')">Borsa & Finans</div>
        <div class="tab-btn" onclick="switchTab('krallik-tab')">Krallıklar & Kartlar</div>
        <div class="tab-btn" onclick="switchTab('mac-tab')">Maç Odası</div>
    </div>

    <div id="puan-tab" class="container active">
        <table>
            <thead><tr><th class="center-col">Sıra</th><th>Takım</th><th class="center-col">O</th><th class="center-col">G</th><th class="center-col">B</th><th class="center-col">M</th><th class="center-col">AG</th><th class="center-col">YG</th><th class="center-col">AV</th><th class="center-col">Puan</th></tr></thead>
            <tbody id="puan-body"></tbody>
        </table>
    </div>

    <div id="vs-tab" class="container">
        <div class="vs-arena">
            <div class="vs-selectors">
                <select id="select-p1" class="vs-select" onchange="updateVS()"></select>
                <b style="font-size:1.5rem; color: #64748b;">VS</b>
                <select id="select-p2" class="vs-select" onchange="updateVS()"></select>
            </div>
            
            <div class="vs-display">
                <div class="player-card p1">
                    <img id="avatar-p1" class="player-avatar" src="https://i.imgur.com/He9ST9X.png">
                    <div id="name-p1" class="player-name">P1</div>
                    <div id="value-p1" class="player-value">€0M</div>
                </div>
                <div class="chart-box"><canvas id="radarChart"></canvas></div>
                <div class="player-card p2">
                    <img id="avatar-p2" class="player-avatar" src="https://i.imgur.com/He9ST9X.png">
                    <div id="name-p2" class="player-name">P2</div>
                    <div id="value-p2" class="player-value">€0M</div>
                </div>
            </div>
            <div class="vs-bars-container" id="vs-bars"></div>
        </div>
    </div>

    <div id="borsa-tab" class="container">
        <table>
            <thead><tr><th class="center-col">#</th><th>Oyuncu</th><th>Takım</th><th class="center-col">MOTM Ödülü</th><th class="center-col">Güncel Piyasa Değeri</th></tr></thead>
            <tbody id="borsa-body"></tbody>
        </table>
    </div>

    <div id="krallik-tab" class="container">
        <div style="padding: 15px; background: #090d16; border-bottom:1px solid var(--border-color)">
            <select id="stat-select" onchange="renderKrallik()" style="background:var(--bg-color); color:#fff; border:1px solid var(--border-color); padding:8px; border-radius:6px; font-weight:600;">
                <option value="G">Gol Krallığı</option>
                <option value="A">Asist Krallığı</option>
                <option value="INT">Intercept (Kesici)</option>
                <option value="SK">🟨 Sarı Kart (Kasaplar)</option>
                <option value="KK">🟥 Kırmızı Kart</option>
                <option value="MOTM">🔥 Maçın Adamı (MOTM)</option>
            </select>
        </div>
        <table>
            <thead><tr><th class="center-col">Sıra</th><th>Oyuncu</th><th>Takım</th><th class="center-col" id="stat-th">İstatistik</th></tr></thead>
            <tbody id="krallik-body"></tbody>
        </table>
    </div>

    <div id="mac-tab" class="container">
        <table>
            <thead><tr><th>Ev Sahibi</th><th class="center-col">Skor</th><th>Deplasman</th><th>Yıldız Oyuncu</th></tr></thead>
            <tbody id="mac-body"></tbody>
        </table>
    </div>

    <script>
        let globalData = {}; let radarChart = null;
        function switchTab(tabId) {
            document.querySelectorAll('.container, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function veriCek() {
            const res = await fetch('https://yepfella.onrender.com/api/puan-durumu');
            globalData = await res.json();
            renderPuan(); initVSSelectors(); renderBorsa(); renderKrallik(); renderMaclar();
        }

        function renderPuan() {
            const list = Object.keys(globalData.takimlar||{}).map(name => ({name, ...globalData.takimlar[name], av: globalData.takimlar[name].AG - globalData.takimlar[name].YG})).sort((a,b) => b.Puan!=a.Puan ? b.Puan-a.Puan : b.av-a.av);
            let html = list.map((t,i) => `<tr><td class="center-col">${i+1}</td><td><b>${t.name}</b></td><td class="center-col">${t.O}</td><td class="center-col">${t.G}</td><td class="center-col">${t.B}</td><td class="center-col">${t.M}</td><td class="center-col">${t.AG}</td><td class="center-col">${t.YG}</td><td class="center-col">${t.av>0?'+'+t.av:t.av}</td><td class="center-col puan-col">${t.Puan}</td></tr>`).join('');
            document.getElementById("puan-body").innerHTML = html || "<tr><td class='loading'>Veri yok</td></tr>";
        }

        function initVSSelectors() {
            const names = Object.keys(globalData.oyuncular||{});
            let s1 = document.getElementById("select-p1"); let s2 = document.getElementById("select-p2");
            s1.innerHTML = names.map((n,i) => `<option value="${n}" ${i==0?'selected':''}>${n}</option>`).join('');
            s2.innerHTML = names.map((n,i) => `<option value="${n}" ${i==1?'selected':''}>${n}</option>`).join('');
            if(names.length >= 2) updateVS();
        }

        function updateVS() {
            const p1 = document.getElementById("select-p1").value; const p2 = document.getElementById("select-p2").value;
            const d1 = globalData.oyuncular[p1] || {G:0, A:0, P:0, S:0, T:0, K:0, INT:0, TK:0, avatar:"", O:0, deger:1000000};
            const d2 = globalData.oyuncular[p2] || {G:0, A:0, P:0, S:0, T:0, K:0, INT:0, TK:0, avatar:"", O:0, deger:1000000};
            
            document.getElementById("name-p1").innerText = p1; document.getElementById("avatar-p1").src = d1.avatar || "https://i.imgur.com/He9ST9X.png";
            document.getElementById("value-p1").innerText = `€${(d1.deger/1000000).toFixed(1)}M`;
            document.getElementById("name-p2").innerText = p2; document.getElementById("avatar-p2").src = d2.avatar || "https://i.imgur.com/He9ST9X.png";
            document.getElementById("value-p2").innerText = `€${(d2.deger/1000000).toFixed(1)}M`;
            
            if(radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart').getContext('2d'), {
                type: 'radar',
                data: { labels: ['GOL', 'ASIST', 'PAS', 'TACKLE', 'INTERCEPT', 'KURTARIŞ'], datasets: [
                    { label: p1, data: [d1.G, d1.A, d1.P, d1.T, d1.INT, d1.K], backgroundColor: 'rgba(0,242,254,0.2)', borderColor: '#00f2fe' },
                    { label: p2, data: [d2.G, d2.A, d2.P, d2.T, d2.INT, d2.K], backgroundColor: 'rgba(255,140,0,0.2)', borderColor: '#ff8c00' }
                ]}, options: { scales: { r: { grid: {color:'#1e293b'}, pointLabels: {color:'#94a3b8'}, ticks:{display:false} } }, plugins: {legend:{display:false}} }
            });

            const metrics = [{l:'MAÇ', k:'O'}, {l:'GOL', k:'G'}, {l:'İNTERCEPT', k:'INT'}, {l:'SARI KART', k:'SK'}];
            document.getElementById("vs-bars").innerHTML = metrics.map(m => {
                let v1=d1[m.k]||0; let v2=d2[m.k]||0; let tot=(v1+v2)||1;
                return `<div class="bar-row"><div class="bar-label">${m.l}</div><div class="bar-wrapper"><div class="bar-val p1">${v1}</div><div class="bar-bg"><div class="fill-p1" style="width:${(v1/tot)*100}%"></div><div class="fill-p2" style="width:${(v2/tot)*100}%"></div></div><div class="bar-val p2">${v2}</div></div></div>`;
            }).join('');
        }

        function renderBorsa() {
            const list = Object.keys(globalData.oyuncular||{}).map(name => ({name, ...globalData.oyuncular[name]})).sort((a,b) => (b.deger||0) - (a.deger||0));
            let html = list.map((p,i) => `<tr><td class="center-col">${i+1}</td><td><b>${p.name}</b> ${p.MOTM>0?'🔥':''}</td><td>${p.takim}</td><td class="center-col">${p.MOTM||0} Kez</td><td class="center-col money-col">€${((p.deger||1000000)/1000000).toFixed(1)}M</td></tr>`).join('');
            document.getElementById("borsa-body").innerHTML = html || "<tr><td class='loading'>Borsa kapalı.</td></tr>";
        }

        function renderKrallik() {
            const key = document.getElementById("stat-select").value;
            const list = Object.keys(globalData.oyuncular||{}).map(name => ({name, ...globalData.oyuncular[name]})).sort((a,b) => (b[key]||0) - (a[key]||0));
            let html = list.slice(0,10).map((p,i) => `<tr><td class="center-col">${i+1}</td><td><b>${p.name}</b></td><td>${p.takim}</td><td class="center-col puan-col">${p[key]||0}</td></tr>`).join('');
            document.getElementById("krallik-body").innerHTML = html;
        }

        function renderMaclar() {
            const maclar = globalData.maclar || [];
            let html = maclar.slice().reverse().map(m => `<tr><td><b>${m.ev}</b></td><td class="center-col puan-col" style="font-size:1.2rem;">${m.skor}</td><td><b>${m.dep}</b></td><td>${m.motm ? `⭐ ${m.motm}` : '-'}</td></tr>`).join('');
            document.getElementById("mac-body").innerHTML = html || "<tr><td colspan='4' class='loading'>Maç yok.</td></tr>";
        }
        veriCek();
    </script>
</body>
</html>
